<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}TNS · ESP/UCAD{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Raleway:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      /* ── Palette Studio Sombre ── */
      --ink:       #0b0914;
      --ink2:      #100e1c;
      --ink3:      #161326;
      --panel:     #1a1730;
      --panel2:    #1e1b38;
      --wire:      #2a2548;
      --wire2:     #3d3768;

      /* Accent chaud : orange-ambre (Track 1 / primary) */
      --amber:     #ff7a30;
      --amber-dim: #c45618;
      --amber-glow: rgba(255,122,48,.28);

      /* Accent froid : cyan électrique (marqueurs / highlights) */
      --cyan:      #a78bff;
      --cyan-dim:  #7557cc;
      --cyan-glow: rgba(167,139,255,.22);

      /* Accent chaud : rose-magenta (Track 3 / danger) */
      --red:       #ff3a8a;
      --red-glow:  rgba(255,58,138,.2);

      /* Accent violet : Track 2 */
      --violet:    #7c6aff;
      --violet-glow: rgba(124,106,255,.22);

      --green:     #3dffc0;
      --green-glow: rgba(61,255,192,.18);
      --text:      #ece8ff;
      --muted:     #8a7aaa;
      --dim:       #504870;

      --mono:    'JetBrains Mono', monospace;
      --display: 'Raleway', sans-serif;
      --r:       8px;
      --rl:      16px;

      /* Motion tokens (MOTION_INTENSITY: 6) */
      --t-fast:  .15s;
      --t-med:   .28s;
      --t-slow:  .5s;
      --ease:    cubic-bezier(.4,0,.2,1);
    }

    /* ── Thème : Mode Sombre (backgrounds neutres, accents bleutés) ── */
    body.theme-dark {
      --ink:       #0d1117;
      --ink2:      #131920;
      --ink3:      #1a2230;
      --panel:     #1f2c3d;
      --panel2:    #1c2838;
      --wire:      #2c3e52;
      --wire2:     #3d556e;
      --amber:     #60a5fa;
      --amber-dim: #3b7dd8;
      --amber-glow: rgba(96,165,250,.25);
      --cyan:      #93c5fd;
      --cyan-dim:  #5b9de8;
      --cyan-glow: rgba(147,197,253,.2);
      --red:       #f472b6;
      --red-glow:  rgba(244,114,182,.2);
      --violet:    #818cf8;
      --violet-glow: rgba(129,140,248,.2);
      --green:     #34d399;
      --green-glow: rgba(52,211,153,.18);
      --text:      #e2e8f4;
      --muted:     #7a9ab8;
      --dim:       #4a6480;
    }

    /* ── Thème : Nuit Bleue (deep navy, accents glacés) ── */
    body.theme-blue-night {
      --ink:       #020918;
      --ink2:      #061228;
      --ink3:      #0b1e3f;
      --panel:     #102454;
      --panel2:    #0e2050;
      --wire:      #1e3868;
      --wire2:     #2e4f85;
      --amber:     #7dd3fc;
      --amber-dim: #4da8d8;
      --amber-glow: rgba(125,211,252,.22);
      --cyan:      #a5f3fc;
      --cyan-dim:  #67d8e8;
      --cyan-glow: rgba(165,243,252,.18);
      --red:       #fb7185;
      --red-glow:  rgba(251,113,133,.2);
      --violet:    #a78bfa;
      --violet-glow: rgba(167,139,250,.2);
      --green:     #6ee7b7;
      --green-glow: rgba(110,231,183,.18);
      --text:      #dbeafe;
      --muted:     #7baed4;
      --dim:       #3d6899;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; scroll-behavior: smooth; }
    body {
      background: var(--ink);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Arrière-plan : grille subtile purple ── */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(167,139,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(167,139,255,.018) 1px, transparent 1px),
        linear-gradient(rgba(167,139,255,.042) 1px, transparent 1px),
        linear-gradient(90deg, rgba(167,139,255,.042) 1px, transparent 1px);
      background-size: 48px 48px, 48px 48px, 240px 240px, 240px 240px;
    }

    /* ── Orbes d'ambiance (DESIGN_VARIANCE: 7) ── */
    body::after {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 600px 400px at 10% 20%,  rgba(255,122,48,.06), transparent),
        radial-gradient(ellipse 500px 500px at 85% 70%,  rgba(124,106,255,.07), transparent),
        radial-gradient(ellipse 400px 300px at 50% 90%,  rgba(255,58,138,.05), transparent);
    }

    /* ══════════════════════════════════════════════
       NAVBAR
    ══════════════════════════════════════════════ */
    .nav {
      position: sticky; top: 0; z-index: 200;
      background: rgba(11,9,20,.88);
      backdrop-filter: blur(24px) saturate(1.4);
      border-bottom: 1px solid var(--wire);
      height: 60px;
      display: flex; align-items: center; padding: 0 2.5rem; gap: 1.8rem;
    }
    .nav-gradient {
      position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg,
        transparent,
        var(--amber) 25%,
        var(--violet) 50%,
        var(--red) 75%,
        transparent);
      opacity: .4;
    }

    /* Brand */
    .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .brand-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, rgba(255,122,48,.18), rgba(167,139,255,.12));
      border: 1px solid var(--wire2); border-radius: var(--r);
      display: flex; align-items: center; justify-content: center;
      transition: box-shadow var(--t-med) var(--ease);
    }
    .brand:hover .brand-icon { box-shadow: 0 0 18px var(--amber-glow); }
    .brand-name { font-family: var(--display); font-weight: 900; font-size: 1rem; color: var(--amber); letter-spacing: .08em; }
    .brand-sub  { font-size: .58rem; color: var(--muted); letter-spacing: .1em; display: block; }
    .nav-sep    { width: 1px; height: 24px; background: var(--wire); }

    /* LED */
    .sys-led  { display: flex; align-items: center; gap: 6px; font-size: .6rem; color: var(--dim); letter-spacing: .12em; }
    .led      { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: blink 2.5s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* Theme selector */
    .theme-selector {
      margin-left: auto; display: flex; align-items: center; gap: .6rem;
      font-size: .68rem; color: var(--muted);
    }
    .theme-selector select {
      border-radius: var(--r); border: 1px solid var(--wire);
      background: var(--ink3); color: var(--text);
      padding: .45rem .7rem; font-family: var(--mono); font-weight: 600;
      letter-spacing: .05em; cursor: pointer;
      transition: border-color var(--t-fast), box-shadow var(--t-fast);
    }
    .theme-selector select:focus { outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-glow); }

    /* Nav links */
    .nav-links { display: flex; gap: 3px; }
    .nav-a {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 16px; border-radius: var(--r);
      font-size: .7rem; font-weight: 500; letter-spacing: .06em;
      color: var(--muted); text-decoration: none;
      border: 1px solid transparent;
      transition: all var(--t-med) var(--ease);
    }
    .nav-a:hover { color: var(--text); background: var(--panel); border-color: var(--wire); }
    .nav-a.on   { color: var(--amber); background: rgba(255,122,48,.08); border-color: rgba(255,122,48,.3); }
    .nav-num    {
      width: 18px; height: 18px; background: var(--ink3);
      border: 1px solid var(--wire); border-radius: 4px;
      display: flex; align-items: center; justify-content: center; font-size: .58rem; font-weight: 700;
    }
    .nav-a.on .nav-num { background: rgba(255,122,48,.2); color: var(--amber); border-color: rgba(255,122,48,.3); }

    /* ══════════════════════════════════════════════
       LAYOUT — VISUAL_DENSITY: 3 (aéré)
    ══════════════════════════════════════════════ */
    .wrap {
      position: relative; z-index: 1;
      max-width: 1380px; margin: 0 auto;
      padding: 3rem 2rem 8rem;
    }

    /* ══════════════════════════════════════════════
       HERO — High-End Visual Design (DV:9, MI:6)
    ══════════════════════════════════════════════ */
    .hero {
      position: relative;
      margin-bottom: 4.5rem;
      padding: 3.5rem 0 2rem;
      overflow: hidden;
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: 2rem; flex-wrap: wrap;
    }

    /* Ligne de séparation animée sous le hero */
    .hero::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--amber) 20%,
        var(--violet) 50%,
        var(--red) 80%,
        transparent 100%);
      background-size: 200% 100%;
      animation: heroLine 4s ease-in-out infinite alternate;
      opacity: .45;
    }
    @keyframes heroLine {
      from { background-position: 0% 0%; }
      to   { background-position: 100% 0%; }
    }

    /* Numéro décoratif géant en arrière-plan */
    .hero-bg-num {
      position: absolute;
      right: -0.04em; top: 50%;
      transform: translateY(-50%);
      font-family: var(--display); font-weight: 900;
      font-size: clamp(10rem, 22vw, 18rem);
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 1px rgba(255,122,48,.065);
      pointer-events: none; user-select: none;
      letter-spacing: -.06em;
      animation: numDrift 8s ease-in-out infinite alternate;
    }
    @keyframes numDrift {
      from { transform: translateY(-52%) translateX(0); }
      to   { transform: translateY(-48%) translateX(-8px); }
    }

    /* Waveform canvas hero */
    .hero-wave {
      position: absolute; bottom: 1px; left: 0; right: 0;
      height: 40px; pointer-events: none; opacity: .3;
    }

    /* Eyebrow : ultra-thin, très espacé */
    .hero-eyebrow {
      display: flex; align-items: center; gap: 14px;
      font-size: .56rem; font-weight: 300;
      letter-spacing: .42em; text-transform: uppercase;
      color: var(--amber); margin-bottom: 1.1rem;
      font-family: var(--mono);
    }
    .hero-eyebrow::before {
      content: '';
      width: 36px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--amber));
      flex-shrink: 0;
    }
    .hero-eyebrow .ey-dot {
      width: 3px; height: 3px; border-radius: 50%;
      background: var(--amber); opacity: .6;
    }

    /* Titre : taille fluide + gradient sur em */
    .hero h1 {
      font-family: var(--display); font-weight: 900;
      font-size: clamp(2rem, 5.5vw, 3.8rem);
      letter-spacing: -.035em; line-height: 1.05;
      margin-bottom: 1.3rem;
    }
    .hero h1 em {
      font-style: normal;
      background: linear-gradient(125deg, var(--amber) 0%, #d97aff 52%, var(--red) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200% 100%;
      animation: titleGrad 6s ease-in-out infinite alternate;
    }
    @keyframes titleGrad {
      from { background-position: 0% 50%; }
      to   { background-position: 100% 50%; }
    }

    /* Description : mono regular, line-height généreux */
    .hero p {
      color: var(--muted); font-size: .8rem;
      line-height: 2.05; max-width: 500px;
      font-weight: 300; letter-spacing: .01em;
    }

    /* Pills méta : alignées à droite, stacking discret */
    .hero-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 7px; }
    .meta-pill {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(22,19,38,.7); border: 1px solid var(--wire);
      border-radius: 99px; padding: 5px 14px;
      font-size: .6rem; color: var(--muted);
      backdrop-filter: blur(8px);
      transition: border-color var(--t-med), color var(--t-med);
    }
    .meta-pill:hover { border-color: rgba(255,122,48,.35); color: var(--text); }
    .meta-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--amber); flex-shrink: 0; }

    /* ══════════════════════════════════════════════
       PANEL — DESIGN_VARIANCE: 7 (bold, glow)
    ══════════════════════════════════════════════ */
    .panel {
      background: var(--panel);
      border: 1px solid var(--wire);
      border-radius: var(--rl);
      overflow: hidden;
      margin-bottom: 2rem;
      position: relative;
      animation: panelUp var(--t-slow) var(--ease) both;
      transition: border-color var(--t-med) var(--ease), box-shadow var(--t-med) var(--ease);
    }
    .panel:hover {
      border-color: var(--wire2);
      box-shadow: 0 4px 32px rgba(124,106,255,.08);
    }
    .panel:nth-child(2){animation-delay:.08s}
    .panel:nth-child(3){animation-delay:.16s}
    .panel:nth-child(4){animation-delay:.24s}
    @keyframes panelUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Ligne de tête du panel — dégradé unique par position */
    .panel::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent 5%, var(--wire2) 30%, var(--wire2) 70%, transparent 95%);
    }
    /* Premier panel de chaque section : accent orange */
    .panel:first-of-type::before {
      background: linear-gradient(90deg, transparent, var(--amber-dim) 40%, var(--amber-dim) 60%, transparent);
      opacity: .55;
    }

    /* Coins décoratifs */
    .c { position: absolute; width: 10px; height: 10px; border-color: var(--amber); border-style: solid; opacity: .3; }
    .c-tl{top:-1px;left:-1px;border-width:2px 0 0 2px}
    .c-tr{top:-1px;right:-1px;border-width:2px 2px 0 0}
    .c-bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px}
    .c-br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}

    .panel-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.1rem 1.6rem; border-bottom: 1px solid var(--wire);
      background: rgba(16,14,28,.55);
    }
    .panel-title {
      display: flex; align-items: center; gap: 10px;
      font-size: .65rem; font-weight: 700; letter-spacing: .14em;
      text-transform: uppercase; color: var(--muted);
    }
    .panel-icon {
      width: 24px; height: 24px; background: var(--ink3);
      border: 1px solid var(--wire2); border-radius: 5px;
      display: flex; align-items: center; justify-content: center; font-size: .72rem;
    }
    .panel-body { padding: 1.8rem; }

    /* ══════════════════════════════════════════════
       GRILLE — Visual Density 3
    ══════════════════════════════════════════════ */
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.8rem; }
    .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.3rem; }
    @media(max-width:900px) { .g2, .g3 { grid-template-columns: 1fr; } }

    /* ══════════════════════════════════════════════
       CHAMPS / INPUTS
    ══════════════════════════════════════════════ */
    .field { margin-bottom: 1.4rem; }
    .field > label {
      display: block; font-size: .62rem; letter-spacing: .14em;
      text-transform: uppercase; color: var(--dim); margin-bottom: .55rem;
    }
    .field > label .u { color: var(--amber); font-weight: 700; margin-left: 4px; }

    select, input[type="number"], input[type="text"], textarea {
      width: 100%; background: var(--ink3); border: 1px solid var(--wire);
      border-radius: var(--r); color: var(--text); font-family: var(--mono);
      font-size: .83rem; padding: .7rem 1rem;
      transition: border-color var(--t-fast), box-shadow var(--t-fast);
      -webkit-appearance: none;
    }
    select:focus, input:focus, textarea:focus {
      outline: none;
      border-color: var(--amber);
      box-shadow: 0 0 0 3px var(--amber-glow);
    }
    select option { background: var(--ink2); }

    /* ── Radio cards ── */
    .rcards { display: flex; gap: 8px; flex-wrap: wrap; }
    .rcard  { flex: 1; min-width: 76px; position: relative; }
    .rcard input { position: absolute; opacity: 0; width: 0; height: 0; }
    .rcard label {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: .8rem .5rem;
      background: var(--ink3); border: 1px solid var(--wire);
      border-radius: var(--r); cursor: pointer;
      transition: all var(--t-med) var(--ease);
      font-size: .78rem; font-weight: 500; color: var(--muted);
      text-align: center; margin-bottom: 0;
    }
    .rcard label small { font-size: .57rem; color: var(--dim); margin-top: 3px; letter-spacing: .06em; }
    .rcard input:checked + label {
      background: rgba(255,122,48,.1);
      border-color: var(--amber); color: var(--amber);
      box-shadow: 0 0 14px var(--amber-glow);
    }
    .rcard input:checked + label small { color: var(--amber-dim); }

    /* ── Slider ── */
    input[type="range"] {
      -webkit-appearance: none; width: 100%; height: 3px;
      background: var(--wire); border-radius: 99px; outline: none; border: none; padding: 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 15px; height: 15px; border-radius: 50%;
      background: var(--amber); cursor: pointer;
      border: 2px solid var(--ink); box-shadow: 0 0 0 1px var(--amber);
      transition: transform var(--t-fast), box-shadow var(--t-fast);
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.3);
      box-shadow: 0 0 0 1px var(--amber), 0 0 12px var(--amber-glow);
    }

    /* ══════════════════════════════════════════════
       BOUTONS — DESIGN_VARIANCE: 7
    ══════════════════════════════════════════════ */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: .72rem 1.8rem; border-radius: var(--r);
      font-family: var(--mono); font-size: .75rem; font-weight: 700;
      letter-spacing: .08em; cursor: pointer; border: 1px solid transparent;
      transition: all var(--t-med) var(--ease);
      text-decoration: none; white-space: nowrap;
    }
    .btn:active { transform: translateY(1px) scale(.98); }
    .btn:disabled { opacity: .3; pointer-events: none; }

    .btn-amber {
      background: linear-gradient(135deg, var(--amber), #ffb830);
      color: var(--ink);
      border-color: transparent;
      box-shadow: 0 2px 20px var(--amber-glow);
    }
    .btn-amber:hover { box-shadow: 0 4px 32px rgba(255,122,48,.45); transform: translateY(-1px); }

    .btn-cyan {
      background: transparent; color: var(--cyan); border-color: var(--cyan);
    }
    .btn-cyan:hover { background: var(--cyan-glow); box-shadow: 0 0 20px var(--cyan-glow); }

    .btn-ghost { background: var(--ink3); color: var(--muted); border-color: var(--wire); }
    .btn-ghost:hover { color: var(--text); border-color: var(--wire2); background: var(--panel2); }

    .btn-green {
      background: rgba(61,255,192,.1); color: var(--green); border-color: rgba(61,255,192,.3);
    }
    .btn-green:hover { background: rgba(61,255,192,.2); box-shadow: 0 0 18px var(--green-glow); }

    .btn-red { background: rgba(255,58,138,.1); color: var(--red); border-color: rgba(255,58,138,.3); }

    .btn-row { display: flex; gap: .8rem; flex-wrap: wrap; margin-top: 1.6rem; align-items: center; }

    /* ══════════════════════════════════════════════
       RECORD RING
    ══════════════════════════════════════════════ */
    .rec-block {
      display: flex; align-items: center; gap: 1.8rem; padding: 1.4rem;
      background: var(--ink3); border: 1px solid var(--wire); border-radius: var(--rl);
    }
    .rec-ring { position: relative; width: 64px; height: 64px; flex-shrink: 0; cursor: pointer; }
    .rec-ring svg { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-90deg); }
    .ring-bg   { fill: none; stroke: var(--wire); stroke-width: 2.5; }
    .ring-fill { fill: none; stroke: var(--red); stroke-width: 2.5; stroke-dasharray: 182; stroke-dashoffset: 182; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
    .rec-inner {
      position: absolute; inset: 10px; background: var(--ink2); border-radius: 50%;
      border: 1px solid var(--wire); display: flex; align-items: center; justify-content: center;
      transition: all var(--t-med) var(--ease);
    }
    .rec-dot { width: 22px; height: 22px; border-radius: 50%; background: var(--red); box-shadow: 0 0 12px var(--red-glow); transition: all var(--t-med) var(--ease); }
    .rec-ring.on .rec-dot   { border-radius: 5px; width: 18px; height: 18px; }
    .rec-ring.on .rec-inner { border-color: var(--red); box-shadow: 0 0 0 4px var(--red-glow); }
    .rec-ring.on .ring-fill { animation: rpulse 1.5s ease-in-out infinite; }
    @keyframes rpulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .rec-time { font-family: var(--display); font-size: 2.1rem; font-weight: 900; color: var(--text); letter-spacing: -.02em; line-height: 1; }
    .rec-time.on { color: var(--red); text-shadow: 0 0 20px var(--red-glow); }
    .rec-st  { font-size: .64rem; color: var(--dim); margin-top: 4px; letter-spacing: .08em; }

    /* ══════════════════════════════════════════════
       OSCILLOSCOPE
    ══════════════════════════════════════════════ */
    .osc {
      position: relative; background: var(--ink);
      border: 1px solid var(--wire); border-radius: var(--r);
      overflow: hidden; height: 96px;
    }
    .osc::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(167,139,255,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(167,139,255,.06) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    .osc canvas  { width: 100%; height: 100%; display: block; }
    .osc-tag     { position: absolute; top: 6px; left: 8px; font-size: .54rem; color: var(--amber); letter-spacing: .12em; opacity: .8; }
    .osc-hz      { position: absolute; top: 6px; right: 8px; font-size: .54rem; color: var(--dim); letter-spacing: .06em; }

    /* ══════════════════════════════════════════════
       PROGRESS
    ══════════════════════════════════════════════ */
    .prog-track { height: 3px; background: var(--wire); border-radius: 99px; overflow: hidden; margin-top: 1.1rem; }
    .prog-fill  {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--red), var(--amber));
      border-radius: 99px; transition: width .5s linear;
      box-shadow: 0 0 8px var(--red);
    }

    /* ══════════════════════════════════════════════
       TABLE
    ══════════════════════════════════════════════ */
    .tbl { width: 100%; border-collapse: collapse; }
    .tbl thead tr { border-bottom: 1px solid var(--wire); }
    .tbl th { padding: .65rem 1.1rem; font-size: .6rem; letter-spacing: .14em; text-transform: uppercase; color: var(--dim); text-align: left; font-weight: 400; }
    .tbl td { padding: .75rem 1.1rem; font-size: .78rem; color: var(--muted); border-bottom: 1px solid rgba(42,37,72,.5); vertical-align: middle; }
    .tbl tbody tr { transition: background var(--t-fast); }
    .tbl tbody tr:hover td { background: rgba(255,122,48,.035); color: var(--text); }
    .tbl a { color: var(--cyan); text-decoration: none; font-size: .72rem; }
    .tbl a:hover { text-decoration: underline; text-shadow: 0 0 10px var(--cyan-glow); }

    /* ══════════════════════════════════════════════
       CHIPS
    ══════════════════════════════════════════════ */
    .chip { display: inline-flex; align-items: center; gap: 3px; padding: 3px 9px; border-radius: 5px; font-size: .63rem; font-weight: 600; letter-spacing: .05em; }
    .ch-a { background: rgba(255,122,48,.14); color: var(--amber); border: 1px solid rgba(255,122,48,.22); }
    .ch-c { background: rgba(167,139,255,.12); color: var(--cyan);  border: 1px solid rgba(167,139,255,.22); }
    .ch-g { background: rgba(61,255,192,.1);   color: var(--green); border: 1px solid rgba(61,255,192,.2); }
    .ch-r { background: rgba(255,58,138,.1);   color: var(--red);   border: 1px solid rgba(255,58,138,.2); }

    /* ══════════════════════════════════════════════
       PLOT WRAPPER
    ══════════════════════════════════════════════ */
    .plot-wrap { background: var(--ink); border: 1px solid var(--wire); border-radius: var(--r); overflow: hidden; position: relative; }
    .plot-wrap img { width: 100%; display: block; }
    .plot-tag {
      position: absolute; top: 8px; left: 10px; font-size: .58rem;
      color: var(--amber); letter-spacing: .1em; text-transform: uppercase;
      background: rgba(11,9,20,.8); padding: 3px 7px; border-radius: 4px;
    }

    /* ══════════════════════════════════════════════
       DROP ZONE
    ══════════════════════════════════════════════ */
    .drop {
      border: 2px dashed var(--wire2); border-radius: var(--rl);
      padding: 3.5rem 2.5rem; text-align: center; cursor: pointer;
      transition: all var(--t-med) var(--ease); position: relative;
      background: var(--ink3);
    }
    .drop:hover, .drop.over {
      border-color: var(--amber);
      background: rgba(255,122,48,.03);
      box-shadow: 0 0 30px var(--amber-glow);
    }
    .drop input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
    .drop-ico  { font-size: 2.6rem; margin-bottom: 1rem; }
    .drop-ttl  { font-family: var(--display); font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: .4rem; }
    .drop-sub  { font-size: .72rem; color: var(--muted); }
    .drop-tags { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 1.1rem; }

    /* ══════════════════════════════════════════════
       AUDIO PLAYER
    ══════════════════════════════════════════════ */
    audio { width: 100%; border-radius: var(--r); filter: invert(1) hue-rotate(200deg) saturate(.9) brightness(1.1); }

    /* ══════════════════════════════════════════════
       TOAST
    ══════════════════════════════════════════════ */
    #toasts { position: fixed; bottom: 1.6rem; right: 1.6rem; display: flex; flex-direction: column; gap: 8px; z-index: 9999; }
    .t {
      background: var(--panel2); border: 1px solid var(--wire); border-radius: var(--r);
      padding: 1rem 1.3rem; font-size: .75rem; min-width: 260px; max-width: 360px;
      display: flex; align-items: flex-start; gap: 10px;
      animation: tin .22s cubic-bezier(.175,.885,.32,1.275);
      box-shadow: 0 10px 36px rgba(0,0,0,.5);
    }
    .t.ok  { border-left: 3px solid var(--green); }
    .t.err { border-left: 3px solid var(--red);   }
    .t.inf { border-left: 3px solid var(--cyan);  }
    @keyframes tin { from { transform: translateX(115%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* ══════════════════════════════════════════════
       SPINNER
    ══════════════════════════════════════════════ */
    .spin {
      width: 16px; height: 16px; border: 2px solid var(--wire);
      border-top-color: var(--amber); border-radius: 50%;
      animation: spinr .55s linear infinite; display: inline-block; flex-shrink: 0;
    }
    @keyframes spinr { to { transform: rotate(360deg); } }

    /* ══════════════════════════════════════════════
       STAT CARD
    ══════════════════════════════════════════════ */
    .stat {
      background: var(--ink3); border: 1px solid var(--wire); border-radius: var(--r);
      padding: 1.1rem 1.3rem;
      transition: border-color var(--t-med), box-shadow var(--t-med);
    }
    .stat:hover { border-color: rgba(255,122,48,.3); box-shadow: 0 0 18px var(--amber-glow); }
    .stat-l { font-size: .57rem; letter-spacing: .14em; text-transform: uppercase; color: var(--dim); }
    .stat-v { font-family: var(--display); font-size: 1.5rem; font-weight: 900; color: var(--amber); margin-top: 3px; }
    .stat-u { font-size: .63rem; color: var(--muted); margin-top: 2px; }

    /* ══════════════════════════════════════════════
       DIVIDER
    ══════════════════════════════════════════════ */
    .div {
      display: flex; align-items: center; gap: 1.2rem;
      margin: 2rem 0; font-size: .6rem; letter-spacing: .14em;
      text-transform: uppercase; color: var(--dim);
    }
    .div::before, .div::after { content: ''; flex: 1; height: 1px; background: var(--wire); }

    /* ══════════════════════════════════════════════
       MASK CANVAS
    ══════════════════════════════════════════════ */
    .mask-c    { width: 100%; height: 56px; background: var(--ink); border: 1px solid var(--wire); border-radius: var(--r); display: block; }
    .mask-ann  { display: flex; justify-content: space-between; font-size: .58rem; color: var(--dim); margin-top: 4px; padding: 0 2px; }

    /* ══════════════════════════════════════════════
       FORMULA
    ══════════════════════════════════════════════ */
    .formula {
      background: var(--ink); border: 1px solid var(--wire);
      border-left: 3px solid var(--amber); border-radius: var(--r);
      padding: 1rem 1.3rem; font-size: .78rem; line-height: 2.2; color: var(--muted);
    }
    .formula .sa { color: var(--amber); font-weight: 700; }
    .formula .sc { color: var(--cyan); }

    /* ══════════════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════════════ */
    @media(max-width:600px) {
      .nav { padding: 0 1.2rem; gap: 1rem; }
      .wrap { padding: 1.2rem 1rem 4rem; }
      .hero h1 { font-size: 1.8rem; }
      .sys-led { display: none; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<nav class="nav">
  <div class="nav-gradient"></div>
  <a class="brand" href="/">
    <div class="brand-icon">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M1 9 Q5 2 9 9 Q13 16 17 9" stroke="#ff7a30" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        <circle cx="9" cy="9" r="1.8" fill="#a78bff"/>
      </svg>
    </div>
    <div class="brand-name">TNS·LAB</div>
  </a>
  <div class="nav-sep"></div>
  <div class="theme-selector">
    <label for="themeSelect">Thème</label>
    <select id="themeSelect" aria-label="Choisir un thème">
      <option value="default">Studio (défaut)</option>
      <option value="blue-night">Nuit bleue</option>
      <option value="dark">Sombre</option>
    </select>
  </div>
  <div class="sys-led"><div class="led"></div>SYSTÈME ACTIF</div>
  <div class="nav-links">
    <a href="/numerisation" class="nav-a {% if request.blueprint=='numerisation' %}on{% endif %}">
      <span class="nav-num">01</span>NUMÉRISATION
    </a>
    <a href="/filtrage" class="nav-a {% if request.blueprint=='filtrage' %}on{% endif %}">
      <span class="nav-num">02</span>FFT &amp; FILTRAGE
    </a>
  </div>
</nav>

<main class="wrap">{% block content %}{% endblock %}</main>

<div id="toasts"></div>

<script>
function toast(msg, type='inf', ms=4200) {
  const ic = {ok:'✓', err:'✗', inf:'◈'};
  const el = document.createElement('div');
  el.className = `t ${type}`;
  el.innerHTML = `<span>${ic[type]}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity .3s, transform .3s';
    el.style.opacity = '0';
    el.style.transform = 'translateX(28px)';
    setTimeout(() => el.remove(), 300);
  }, ms);
}
function fmt(s){ return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }

/* ── Thème ── */
const themeOption = document.getElementById('themeSelect');
const themeClassList = ['theme-dark','theme-blue-night'];
function setTheme(theme){
  document.body.classList.remove(...themeClassList);
  if(theme==='dark') document.body.classList.add('theme-dark');
  else if(theme==='blue-night') document.body.classList.add('theme-blue-night');
  localStorage.setItem('tns-theme', theme);
  if(themeOption) themeOption.value = theme || 'default';
}
(function(){
  const saved = localStorage.getItem('tns-theme') || 'default';
  if(themeOption){
    themeOption.value = saved;
    themeOption.addEventListener('change', e => setTheme(e.target.value));
  }
  setTheme(saved);
})();

/* ── Drop zones ── */
document.querySelectorAll('.drop').forEach(z => {
  z.addEventListener('dragover', e => { e.preventDefault(); z.classList.add('over'); });
  z.addEventListener('dragleave', () => z.classList.remove('over'));
  z.addEventListener('drop', e => { e.preventDefault(); z.classList.remove('over'); });
});

/* ── Hero waveform décoratif ── */
(function() {
  const c = document.querySelector('.hero-wave');
  if (!c) return;
  const cx = c.getContext('2d');
  let t = 0;
  const COLORS = ['#ff7a30','#a78bff','#ff3a8a'];
  function draw() {
    const W = c.width = c.offsetWidth, H = c.height = c.offsetHeight;
    cx.clearRect(0, 0, W, H);
    COLORS.forEach((col, ci) => {
      cx.beginPath();
      cx.strokeStyle = col;
      cx.lineWidth = 1.2;
      cx.globalAlpha = .55 - ci * .12;
      const freq = .018 + ci * .006;
      const amp  = H * (.38 - ci * .08);
      const off  = (ci * Math.PI * 2) / 3;
      for (let x = 0; x <= W; x += 2) {
        const y = H/2 + Math.sin(x * freq + t + off) * amp
                      * Math.sin(x * .004 + t * .3 + off);
        x === 0 ? cx.moveTo(x, y) : cx.lineTo(x, y);
      }
      cx.stroke();
    });
    cx.globalAlpha = 1;
    t += .018;
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
