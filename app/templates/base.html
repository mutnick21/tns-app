<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}TNS · ESP/UCAD{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Raleway:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:       #080b0f;
      --ink2:      #0e1318;
      --ink3:      #141a21;
      --panel:     #111820;
      --panel2:    #172030;
      --wire:      #1e2d3d;
      --wire2:     #243447;
      --amber:     #ffb830;
      --amber-dim: #c47a00;
      --cyan:      #0df0d4;
      --cyan-dim:  #07a890;
      --red:       #ff4757;
      --green:     #2ed573;
      --text:      #d8e8f0;
      --muted:     #5a7a90;
      --dim:       #3a5060;
      --mono:      'JetBrains Mono', monospace;
      --display:   'Raleway', sans-serif;
      --r:         6px;
      --rl:        12px;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { font-size:14px; scroll-behavior:smooth; }
    body { background:var(--ink); color:var(--text); font-family:var(--mono); min-height:100vh; overflow-x:hidden; }

    /* Grille de fond millimétré */
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background-image:
        linear-gradient(rgba(13,240,212,.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(13,240,212,.028) 1px, transparent 1px),
        linear-gradient(rgba(13,240,212,.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(13,240,212,.055) 1px, transparent 1px);
      background-size: 40px 40px, 40px 40px, 200px 200px, 200px 200px;
    }

    /* ── Navbar ── */
    .nav {
      position:sticky; top:0; z-index:200;
      background:rgba(8,11,15,.94);
      backdrop-filter:blur(20px);
      border-bottom:1px solid var(--wire);
      height:54px;
      display:flex; align-items:center; padding:0 2rem; gap:1.5rem;
    }
    .nav-gradient {
      position:absolute; bottom:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,var(--amber) 30%,var(--cyan) 70%,transparent);
      opacity:.35;
    }
    .brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .brand-icon {
      width:32px; height:32px;
      background:linear-gradient(135deg,rgba(255,184,48,.15),rgba(13,240,212,.1));
      border:1px solid var(--wire2); border-radius:var(--r);
      display:flex; align-items:center; justify-content:center;
    }
    .brand-name { font-family:var(--display); font-weight:900; font-size:.9rem; color:var(--amber); letter-spacing:.08em; }
    .brand-sub  { font-size:.58rem; color:var(--muted); letter-spacing:.1em; display:block; }
    .nav-sep    { width:1px; height:22px; background:var(--wire); }
    .sys-led    { display:flex; align-items:center; gap:5px; font-size:.6rem; color:var(--dim); letter-spacing:.1em; }
    .led        { width:5px; height:5px; border-radius:50%; background:var(--green); box-shadow:0 0 5px var(--green); animation:blink 2.5s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
    .nav-links  { margin-left:auto; display:flex; gap:2px; }
    .nav-a {
      display:flex; align-items:center; gap:7px;
      padding:6px 14px; border-radius:var(--r);
      font-size:.7rem; font-weight:500; letter-spacing:.06em;
      color:var(--muted); text-decoration:none;
      border:1px solid transparent; transition:all .15s;
    }
    .nav-a:hover { color:var(--text); background:var(--panel); border-color:var(--wire); }
    .nav-a.on   { color:var(--amber); background:rgba(255,184,48,.08); border-color:rgba(255,184,48,.3); }
    .nav-num    { width:17px; height:17px; background:var(--ink3); border:1px solid var(--wire); border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:.58rem; font-weight:700; }
    .nav-a.on .nav-num { background:rgba(255,184,48,.2); color:var(--amber); border-color:rgba(255,184,48,.3); }

    /* ── Layout ── */
    .wrap { position:relative; z-index:1; max-width:1320px; margin:0 auto; padding:2rem 1.5rem 6rem; }

    /* ── Hero ── */
    .hero { margin-bottom:2.5rem; display:flex; align-items:flex-end; justify-content:space-between; gap:2rem; flex-wrap:wrap; }
    .hero-eyebrow { display:flex; align-items:center; gap:8px; font-size:.62rem; letter-spacing:.2em; text-transform:uppercase; color:var(--cyan); margin-bottom:.6rem; }
    .hero-eyebrow::before { content:''; width:18px; height:1px; background:var(--cyan); }
    .hero h1 { font-family:var(--display); font-weight:900; font-size:2rem; letter-spacing:-.02em; line-height:1.1; }
    .hero h1 em { font-style:normal; color:var(--amber); }
    .hero p  { color:var(--muted); font-size:.78rem; margin-top:.4rem; max-width:460px; line-height:1.75; }
    .hero-meta { display:flex; flex-direction:column; align-items:flex-end; gap:5px; }
    .meta-pill { display:inline-flex; align-items:center; gap:5px; background:var(--panel); border:1px solid var(--wire); border-radius:99px; padding:3px 10px; font-size:.6rem; color:var(--muted); }
    .meta-dot  { width:4px; height:4px; border-radius:50%; background:var(--amber); }

    /* ── Panel ── */
    .panel {
      background:var(--panel); border:1px solid var(--wire); border-radius:var(--rl);
      overflow:hidden; margin-bottom:1.5rem; position:relative;
      animation:up .3s ease both;
    }
    .panel:nth-child(2){animation-delay:.06s} .panel:nth-child(3){animation-delay:.12s} .panel:nth-child(4){animation-delay:.18s}
    @keyframes up { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .panel::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent 5%,var(--wire2) 30%,var(--wire2) 70%,transparent 95%); }
    /* coin decoratifs */
    .c { position:absolute; width:9px; height:9px; border-color:var(--amber); border-style:solid; opacity:.35; }
    .c-tl{top:-1px;left:-1px;border-width:2px 0 0 2px} .c-tr{top:-1px;right:-1px;border-width:2px 2px 0 0}
    .c-bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px} .c-br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
    .panel-head {
      display:flex; align-items:center; justify-content:space-between;
      padding:.9rem 1.4rem; border-bottom:1px solid var(--wire);
      background:rgba(14,19,24,.5);
    }
    .panel-title { display:flex; align-items:center; gap:9px; font-size:.63rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }
    .panel-icon  { width:22px; height:22px; background:var(--ink3); border:1px solid var(--wire2); border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:.7rem; }
    .panel-body  { padding:1.4rem; }

    /* ── Grid ── */
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:1.4rem}
    .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
    @media(max-width:860px){.g2,.g3{grid-template-columns:1fr}}

    /* ── Fields ── */
    .field { margin-bottom:1rem; }
    .field > label { display:block; font-size:.6rem; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin-bottom:.45rem; }
    .field > label .u { color:var(--amber); font-weight:700; margin-left:3px; }
    select,input[type="number"],input[type="text"],textarea {
      width:100%; background:var(--ink3); border:1px solid var(--wire); border-radius:var(--r);
      color:var(--text); font-family:var(--mono); font-size:.82rem; padding:.6rem .85rem;
      transition:border-color .15s, box-shadow .15s; -webkit-appearance:none;
    }
    select:focus,input:focus,textarea:focus { outline:none; border-color:var(--cyan); box-shadow:0 0 0 3px rgba(13,240,212,.1); }
    select option { background:var(--ink2); }

    /* Radio cards */
    .rcards { display:flex; gap:7px; flex-wrap:wrap; }
    .rcard  { flex:1; min-width:72px; position:relative; }
    .rcard input { position:absolute; opacity:0; width:0; height:0; }
    .rcard label {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:.65rem .4rem; background:var(--ink3); border:1px solid var(--wire);
      border-radius:var(--r); cursor:pointer; transition:all .15s;
      font-size:.76rem; font-weight:500; color:var(--muted); text-align:center;
      margin-bottom:0;
    }
    .rcard label small { font-size:.56rem; color:var(--dim); margin-top:2px; letter-spacing:.06em; }
    .rcard input:checked + label { background:rgba(255,184,48,.08); border-color:var(--amber); color:var(--amber); }
    .rcard input:checked + label small { color:var(--amber-dim); }

    /* Slider */
    input[type="range"] { -webkit-appearance:none; width:100%; height:3px; background:var(--wire); border-radius:99px; outline:none; border:none; padding:0; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:13px; height:13px; border-radius:50%; background:var(--amber); cursor:pointer; border:2px solid var(--ink); box-shadow:0 0 0 1px var(--amber); transition:transform .15s; }
    input[type="range"]::-webkit-slider-thumb:hover { transform:scale(1.25); }

    /* ── Boutons ── */
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:7px; padding:.62rem 1.5rem; border-radius:var(--r); font-family:var(--mono); font-size:.73rem; font-weight:700; letter-spacing:.08em; cursor:pointer; border:1px solid transparent; transition:all .18s; text-decoration:none; white-space:nowrap; }
    .btn:active { transform:translateY(1px); }
    .btn:disabled { opacity:.3; pointer-events:none; }
    .btn-amber  { background:var(--amber); color:var(--ink); border-color:var(--amber); box-shadow:0 2px 14px rgba(255,184,48,.22); }
    .btn-amber:hover  { box-shadow:0 4px 22px rgba(255,184,48,.38); }
    .btn-cyan   { background:transparent; color:var(--cyan); border-color:var(--cyan); }
    .btn-cyan:hover   { background:rgba(13,240,212,.07); box-shadow:0 0 16px rgba(13,240,212,.18); }
    .btn-ghost  { background:var(--ink3); color:var(--muted); border-color:var(--wire); }
    .btn-ghost:hover  { color:var(--text); border-color:var(--wire2); }
    .btn-green  { background:rgba(46,213,115,.1); color:var(--green); border-color:rgba(46,213,115,.35); }
    .btn-green:hover  { background:rgba(46,213,115,.18); }
    .btn-red    { background:rgba(255,71,87,.1);  color:var(--red);  border-color:rgba(255,71,87,.35); }
    .btn-row    { display:flex; gap:.65rem; flex-wrap:wrap; margin-top:1.3rem; align-items:center; }

    /* ── Record ring ── */
    .rec-block  { display:flex; align-items:center; gap:1.4rem; padding:1.1rem; background:var(--ink3); border:1px solid var(--wire); border-radius:var(--rl); }
    .rec-ring   { position:relative; width:58px; height:58px; flex-shrink:0; cursor:pointer; }
    .rec-ring svg { position:absolute; inset:0; width:100%; height:100%; transform:rotate(-90deg); }
    .ring-bg    { fill:none; stroke:var(--wire); stroke-width:2.5; }
    .ring-fill  { fill:none; stroke:var(--red); stroke-width:2.5; stroke-dasharray:164; stroke-dashoffset:164; stroke-linecap:round; transition:stroke-dashoffset 1s linear; }
    .rec-inner  { position:absolute; inset:9px; background:var(--ink2); border-radius:50%; border:1px solid var(--wire); display:flex; align-items:center; justify-content:center; transition:all .2s; }
    .rec-dot    { width:20px; height:20px; border-radius:50%; background:var(--red); box-shadow:0 0 8px rgba(255,71,87,.5); transition:all .2s; }
    .rec-ring.on .rec-dot   { border-radius:4px; width:16px; height:16px; }
    .rec-ring.on .rec-inner { border-color:var(--red); box-shadow:0 0 0 3px rgba(255,71,87,.14); }
    .rec-ring.on .ring-fill { animation:rpulse 1.5s ease-in-out infinite; }
    @keyframes rpulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .rec-info  {}
    .rec-time  { font-family:var(--display); font-size:1.9rem; font-weight:900; color:var(--text); letter-spacing:-.02em; line-height:1; }
    .rec-time.on { color:var(--red); }
    .rec-st    { font-size:.62rem; color:var(--dim); margin-top:3px; letter-spacing:.08em; }

    /* ── Oscilloscope ── */
    .osc { position:relative; background:var(--ink); border:1px solid var(--wire); border-radius:var(--r); overflow:hidden; height:88px; }
    .osc::before { content:''; position:absolute; inset:0; background-image:linear-gradient(rgba(13,240,212,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(13,240,212,.07) 1px,transparent 1px); background-size:28px 28px; pointer-events:none; }
    .osc canvas  { width:100%; height:100%; display:block; }
    .osc-tag     { position:absolute; top:5px; left:7px; font-size:.52rem; color:var(--cyan); letter-spacing:.12em; opacity:.7; }
    .osc-hz      { position:absolute; top:5px; right:7px; font-size:.52rem; color:var(--dim); letter-spacing:.06em; }

    /* ── Progress ── */
    .prog-track { height:3px; background:var(--wire); border-radius:99px; overflow:hidden; margin-top:.9rem; }
    .prog-fill  { height:100%; width:0%; background:linear-gradient(90deg,var(--red),var(--amber)); border-radius:99px; transition:width .5s linear; box-shadow:0 0 6px var(--red); }

    /* ── Table ── */
    .tbl { width:100%; border-collapse:collapse; }
    .tbl thead tr { border-bottom:1px solid var(--wire); }
    .tbl th { padding:.55rem 1rem; font-size:.58rem; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); text-align:left; font-weight:400; }
    .tbl td { padding:.62rem 1rem; font-size:.76rem; color:var(--muted); border-bottom:1px solid rgba(30,45,61,.45); vertical-align:middle; }
    .tbl tbody tr { transition:background .1s; }
    .tbl tbody tr:hover td { background:rgba(255,184,48,.03); color:var(--text); }
    .tbl a { color:var(--cyan); text-decoration:none; font-size:.7rem; }
    .tbl a:hover { text-decoration:underline; }

    /* ── Chips ── */
    .chip { display:inline-flex; align-items:center; gap:3px; padding:2px 7px; border-radius:4px; font-size:.62rem; font-weight:600; letter-spacing:.05em; }
    .ch-a { background:rgba(255,184,48,.12); color:var(--amber); border:1px solid rgba(255,184,48,.2); }
    .ch-c { background:rgba(13,240,212,.1);  color:var(--cyan);  border:1px solid rgba(13,240,212,.2); }
    .ch-g { background:rgba(46,213,115,.1);  color:var(--green); border:1px solid rgba(46,213,115,.2); }
    .ch-r { background:rgba(255,71,87,.1);   color:var(--red);   border:1px solid rgba(255,71,87,.2); }

    /* ── Plot ── */
    .plot-wrap { background:var(--ink); border:1px solid var(--wire); border-radius:var(--r); overflow:hidden; position:relative; }
    .plot-wrap img { width:100%; display:block; }
    .plot-tag { position:absolute; top:7px; left:9px; font-size:.58rem; color:var(--amber); letter-spacing:.1em; text-transform:uppercase; background:rgba(8,11,15,.75); padding:2px 6px; border-radius:3px; }

    /* ── Drop zone ── */
    .drop { border:2px dashed var(--wire2); border-radius:var(--rl); padding:2.8rem 2rem; text-align:center; cursor:pointer; transition:all .2s; position:relative; background:var(--ink3); }
    .drop:hover,.drop.over { border-color:var(--amber); background:rgba(255,184,48,.025); }
    .drop input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; }
    .drop-ico  { font-size:2.2rem; margin-bottom:.9rem; }
    .drop-ttl  { font-family:var(--display); font-size:1rem; font-weight:700; color:var(--text); margin-bottom:.35rem; }
    .drop-sub  { font-size:.7rem; color:var(--muted); }
    .drop-tags { display:flex; gap:5px; justify-content:center; flex-wrap:wrap; margin-top:.9rem; }

    /* ── Audio ── */
    audio { width:100%; border-radius:var(--r); filter:invert(1) hue-rotate(200deg) saturate(.8); }

    /* ── Toast ── */
    #toasts { position:fixed; bottom:1.4rem; right:1.4rem; display:flex; flex-direction:column; gap:7px; z-index:9999; }
    .t { background:var(--panel2); border:1px solid var(--wire); border-radius:var(--r); padding:.85rem 1.1rem; font-size:.73rem; min-width:250px; max-width:340px; display:flex; align-items:flex-start; gap:9px; animation:tin .2s cubic-bezier(.175,.885,.32,1.275); box-shadow:0 8px 28px rgba(0,0,0,.45); }
    .t.ok  { border-left:3px solid var(--green); }
    .t.err { border-left:3px solid var(--red);   }
    .t.inf { border-left:3px solid var(--cyan);  }
    @keyframes tin { from{transform:translateX(110%);opacity:0} to{transform:translateX(0);opacity:1} }

    /* ── Spinner ── */
    .spin { width:15px; height:15px; border:2px solid var(--wire); border-top-color:var(--amber); border-radius:50%; animation:spinr .6s linear infinite; display:inline-block; flex-shrink:0; }
    @keyframes spinr { to{transform:rotate(360deg)} }

    /* ── Stat ── */
    .stat { background:var(--ink3); border:1px solid var(--wire); border-radius:var(--r); padding:.85rem 1rem; }
    .stat-l { font-size:.56rem; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); }
    .stat-v { font-family:var(--display); font-size:1.35rem; font-weight:900; color:var(--amber); margin-top:2px; }
    .stat-u { font-size:.62rem; color:var(--muted); margin-top:1px; }

    /* ── Divider ── */
    .div { display:flex; align-items:center; gap:1rem; margin:1.4rem 0; font-size:.58rem; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); }
    .div::before,.div::after { content:''; flex:1; height:1px; background:var(--wire); }

    /* ── Mask canvas ── */
    .mask-c    { width:100%; height:52px; background:var(--ink); border:1px solid var(--wire); border-radius:var(--r); display:block; }
    .mask-ann  { display:flex; justify-content:space-between; font-size:.58rem; color:var(--dim); margin-top:3px; padding:0 2px; }

    /* ── Formula ── */
    .formula { background:var(--ink); border:1px solid var(--wire); border-left:3px solid var(--amber); border-radius:var(--r); padding:.85rem 1.1rem; font-size:.76rem; line-height:2.1; color:var(--muted); }
    .formula .sa { color:var(--amber); font-weight:700; }
    .formula .sc { color:var(--cyan); }

    @media(max-width:600px){.nav{padding:0 1rem;gap:1rem}.wrap{padding:1rem}.hero h1{font-size:1.6rem}.sys-led{display:none}}
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<nav class="nav">
  <div class="nav-gradient"></div>
  <a class="brand" href="/">
    <div class="brand-icon">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M1 8 Q4 2 8 8 Q12 14 15 8" stroke="#ffb830" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <circle cx="8" cy="8" r="1.5" fill="#0df0d4"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">TNS·LAB</div>
      <span class="brand-sub">ESP / UCAD — DIC 2</span>
    </div>
  </a>
  <div class="nav-sep"></div>
  <div class="sys-led"><div class="led"></div>SYSTÈME ACTIF</div>
  <div class="nav-links">
    <a href="/numerisation" class="nav-a {% if request.blueprint=='numerisation' %}on{% endif %}">
      <span class="nav-num">01</span>NUMÉRISATION
    </a>
    <a href="/filtrage" class="nav-a {% if request.blueprint=='filtrage' %}on{% endif %}">
      <span class="nav-num">02</span>FFT &amp; FILTRAGE
    </a>
  </div>
</nav>

<main class="wrap">{% block content %}{% endblock %}</main>

<div id="toasts"></div>

<script>
function toast(msg, type='inf', ms=4200) {
  const ic = {ok:'✓', err:'✗', inf:'◈'};
  const el = document.createElement('div');
  el.className = `t ${type}`;
  el.innerHTML = `<span>${ic[type]}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => { el.style.transition='opacity .3s,transform .3s'; el.style.opacity='0'; el.style.transform='translateX(28px)'; setTimeout(()=>el.remove(),300); }, ms);
}
function fmt(s){ return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }
document.querySelectorAll('.drop').forEach(z=>{
  z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('over')});
  z.addEventListener('dragleave',()=>z.classList.remove('over'));
  z.addEventListener('drop',e=>{e.preventDefault();z.classList.remove('over')});
});
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
